<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DuelTracker</title>
    <meta name="theme-color" content="#ffffff" />
    <!-- Use a relative base so the app can be hosted from GitHub Pages subfolders -->
    <base href="./" />
    <link rel="preload" id="webassembly" />
    <link rel="manifest" href="manifest.json" />
    <link href="_content/Microsoft.FluentUI.AspNetCore.Components/css/reboot.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link href="DuelTracker.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
    <script>
        // Register a basic service worker if supported (optional).
        // Use a relative path so this works when hosted under a repo subpath (GitHub Pages).
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js').catch(function (e) {
                // ignore registration errors
                console.warn('ServiceWorker registration failed:', e);
            });
        }
    </script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>

</body>

</html>
